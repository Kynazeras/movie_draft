services:
  postgres:
    image: postgres:16-alpine
    container_name: movie_draft_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: movie_draft
      POSTGRES_PASSWORD: movie_draft_dev
      POSTGRES_DB: movie_draft
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U movie_draft -d movie_draft']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
